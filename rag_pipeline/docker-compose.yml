services:

  # ── Retrieval API ─────────────────────────────────────────
  backend:
    build: .
    container_name: virchow_backend
    environment:
      PG_HOST: 192.168.10.10
      PG_PORT: 5433
      PG_DATABASE: virchow_dev
      PG_USER: postgres
      PG_PASSWORD: 'Eppl$456!'
      LLM_URL: http://ollama:11434
      LLM_MODEL: qwen2.5:0.5b
      JWT_SECRET: change-this-in-production
      EMBEDDING_DEVICE: cpu
      MAX_TOKENS: "300"
      SIM_THRESHOLD: "0.50"
      TOP_K: "8"
      SEAWEEDFS_FILER_URL: http://192.168.10.10:8889
      SEAWEEDFS_BUCKET: rag-docs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        INTERNAL_URL: http://backend:8080
    container_name: virchow_web
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── Ollama LLM (local inference) ──────────────────────────
  # Remove this service if you use an external LLM endpoint.
  ollama:
    image: ollama/ollama:latest
    container_name: virchow_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  ollama_data:
