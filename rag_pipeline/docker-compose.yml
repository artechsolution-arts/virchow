services:
  # ── Progress Tracking / Fencing ──────────────────────────
  redis:
    image: redis:alpine
    container_name: rag_redis
    ports:
      - "6379:6379"

  # ── Message Broker ───────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rag_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SeaweedFS Distributed Storage ────────────────────────
  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: seaweedfs_master
    ports:
      - "9333:9333"
    command: "master -ip=seaweedfs-master"

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: seaweedfs_volume
    depends_on:
      - seaweedfs-master
    command: "volume -mserver=seaweedfs-master:9333 -port=8081"

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: seaweedfs_filer
    depends_on:
      - seaweedfs-master
    ports:
      - "8888:8888"
    command: "filer -master=seaweedfs-master:9333"

  # ── API Server ───────────────────────────────────────────
  rag-api:
    build: .
    container_name: rag_api
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBIT_HOST=rabbitmq
      - REDIS_HOST=redis
      - SEAWEEDFS_HOST=seaweedfs-filer
      - PYTHONPATH=.:..:../../
    env_file: ../.env
    volumes:
      - ./rag-docs:/app/rag_pipeline/rag-docs
      - ../dots_ocr:/app/dots_ocr
      - ../backend/weights/DotsOCR:/app/weights/DotsOCR
    ports:
      - "8080:8080"
    command: python main.py

  # ── Ingestion Worker ─────────────────────────────────────
  rag-worker:
    build: .
    container_name: rag_worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - RABBIT_HOST=rabbitmq
      - REDIS_HOST=redis
      - SEAWEEDFS_HOST=seaweedfs-filer
      - PYTHONPATH=.:..:../../
    env_file: ../.env
    volumes:
      - ./rag-docs:/app/rag_pipeline/rag-docs
      - ../dots_ocr:/app/dots_ocr
      - ../backend/weights/DotsOCR:/app/weights/DotsOCR
    command: python worker_main.py

  # ── OCR Engine (DotsOCR VLM) ─────────────────────────────
  dots_ocr:
    image: hilab/dots-ocr:latest
    container_name: rag_dots_ocr
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=rednote-hilab/dots.ocr
      - USE_HF=true
      - DOTS_OCR_WEIGHTS=/app/weights/DotsOCR
    volumes:
      - ../backend/weights/DotsOCR:/app/weights/DotsOCR
