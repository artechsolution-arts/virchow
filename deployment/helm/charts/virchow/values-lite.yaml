# =============================================================================
# VIRCHOW LITE — MINIMAL DEPLOYMENT VALUES
# =============================================================================
# Minimal Virchow deployment: no vector database, no Redis, no model servers.
# Only PostgreSQL is required. Connectors and RAG search are disabled, but the
# core chat experience (LLM conversations, tools, user file uploads, Projects,
# Agent knowledge) still works.
#
# Usage:
#   helm install virchow ./deployment/helm/charts/virchow \
#     -f ./deployment/helm/charts/virchow/values-lite.yaml
#
# Or merged with your own overrides:
#   helm install virchow ./deployment/helm/charts/virchow \
#     -f ./deployment/helm/charts/virchow/values-lite.yaml \
#     -f my-overrides.yaml
# =============================================================================

vectorDB:
  enabled: false

vespa:
  enabled: false

redis:
  enabled: false

configMap:
  CACHE_BACKEND: "postgres"
  AUTH_BACKEND: "postgres"
  FILE_STORE_BACKEND: "postgres"
